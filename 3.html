<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>心情能量站 · 讯飞语音版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(145deg,#f5f0ff,#e4d5f0,#d9c8f0);min-height:100vh;display:flex;justify-content:center;padding:24px 16px 60px;color:#1e1b4b;line-height:1.6}
.container{max-width:590px;width:100%}
.browser-hint{background:rgba(255,248,238,.85);backdrop-filter:blur(6px);border-radius:40px;padding:8px 18px;font-size:13px;color:#7c5c9e;text-align:center;margin-bottom:18px;border:1px solid rgba(139,92,246,.15)}
.browser-hint strong{color:#6d3bd4}
header{text-align:center;margin-bottom:28px}
header h1{font-size:36px;background:linear-gradient(135deg,#6d3bd4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
header p{color:#7c6b9e;letter-spacing:4px;font-size:16px}

/* ===== 讯飞配置面板 ===== */
.cfg-toggle{display:flex;justify-content:center;margin-bottom:12px}
.cfg-toggle button{background:rgba(255,255,255,.7);border:1px solid #e0d6f2;border-radius:20px;padding:4px 16px;font-size:12px;color:#7c5c9e;cursor:pointer}
.cfg-panel{background:rgba(255,255,255,.95);border-radius:16px;padding:14px 18px;margin-bottom:16px;border:1.5px solid #ddd6fe;display:none;font-size:13px;color:#3b2e5c;line-height:1.8}
.cfg-panel.show{display:block}
.cfg-panel label{font-weight:600;color:#4a2d7a;display:block;margin-top:6px}
.cfg-panel input{flex:1;min-width:0;padding:5px 10px;border-radius:8px;border:1px solid #c4b5fd;font-size:13px;background:#faf8ff;color:#1e1b4b;width:100%;margin-top:2px;font-family:monospace}
.cfg-panel input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 2px rgba(139,92,246,.12)}
.cfg-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cfg-row label{min-width:72px;margin:0}
.cfg-save{margin-top:10px;padding:6px 20px;border-radius:20px;border:none;background:linear-gradient(135deg,#8b5cf6,#6d3bd4);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.cfg-saved{color:#059669;font-size:12px;margin-left:8px}

.card{background:rgba(255,255,255,.87);backdrop-filter:blur(16px);border-radius:24px;padding:26px 22px;box-shadow:0 8px 40px rgba(107,73,186,.08);border:1px solid rgba(255,255,255,.5);margin-bottom:22px}
.card-title{font-size:17px;font-weight:650;color:#4a2d7a;margin-bottom:14px}
.mic-section{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:20px}
.mic-btn{width:72px;height:72px;border-radius:50%;border:none;background:linear-gradient(135deg,#ddd6fe,#c4b5fd);font-size:36px;cursor:pointer;box-shadow:0 4px 16px rgba(139,92,246,.18);transition:all .25s;display:flex;align-items:center;justify-content:center;color:#4a2d7a;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;outline:none;touch-action:manipulation}
.mic-btn:focus-visible{outline:2px solid #6d3bd4;outline-offset:2px}
.mic-btn .mic-icon{pointer-events:none;user-select:none}
.mic-btn:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(139,92,246,.26)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.listening{background:linear-gradient(135deg,#fca5a5,#ef4444);color:#fff;animation:pulse 1.2s ease-in-out infinite;box-shadow:0 4px 24px rgba(239,68,68,.45)}
@keyframes pulse{0%,100%{box-shadow:0 4px 24px rgba(239,68,68,.45)}50%{box-shadow:0 4px 48px rgba(239,68,68,.65)}}
.mic-status{font-size:13px;color:#7c6b9e;min-height:20px;text-align:center}
.mic-status.active{color:#dc2626}
.mic-status.success{color:#16a34a}
.mic-status.error{color:#b91c1c}
.emotion-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:420px;margin:0 auto}
.emotion-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px 12px;border-radius:18px;border:2px solid transparent;background:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;color:#3b2e5c;box-shadow:0 2px 8px rgba(107,73,186,.05);user-select:none}
.emotion-btn:hover{background:rgba(237,233,254,.8);border-color:#c4b5fd;transform:translateY(-2px)}
.emotion-btn .emoji-icon{font-size:32px}
.emotion-btn.active{background:#ede9fe;border-color:#6d3bd4;box-shadow:0 4px 20px rgba(109,59,212,.18);color:#4a1d96}
.info-card .emotion-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.info-card .emotion-head .big-emoji{font-size:42px}
.info-card .emotion-head .name{font-size:24px;font-weight:700;color:#2d1b69}
.info-card .section-label{font-size:14px;font-weight:600;color:#6d3bd4;margin-top:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.info-card .section-label .tag{background:#ede9fe;border-radius:20px;padding:0 10px;font-size:11px;color:#5b3b8a;height:20px;line-height:20px}
.info-card .psych-text,.info-card .task-text{font-size:15px;color:#2d2a3e;background:rgba(245,240,255,.5);border-radius:14px;padding:12px 16px;line-height:1.7}
.info-card .ai-footer{margin-top:16px;text-align:right;font-size:12px;color:#9a84c0;border-top:1px solid rgba(139,92,246,.1);padding-top:12px}
.info-card .ai-footer span{background:rgba(139,92,246,.07);padding:2px 14px;border-radius:30px}
.note-area textarea{width:100%;min-height:120px;padding:14px 16px;border-radius:16px;border:1.5px solid #e0d6f2;background:rgba(255,255,255,.75);font-size:15px;font-family:inherit;color:#1e1b4b;resize:vertical;outline:none;transition:border .2s,box-shadow .2s}
.note-area textarea:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.12)}
.note-area textarea.recording-highlight{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.15)}
.note-buttons{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.note-buttons button{flex:1;min-width:70px;padding:11px 0;border-radius:40px;border:none;font-size:15px;font-weight:550;cursor:pointer;transition:all .2s;background:#f0ebfb;color:#4a2d7a;box-shadow:0 2px 6px rgba(107,73,186,.06)}
.note-buttons button:hover{transform:translateY(-1.5px);box-shadow:0 6px 18px rgba(107,73,186,.1)}
.note-buttons .btn-save{background:linear-gradient(135deg,#8b5cf6,#6d3bd4);color:#fff}
.note-buttons .btn-clear{background:#f3eeff;color:#6b509a}
.note-buttons .btn-read{background:#ede9fe;color:#5b3b8a}
.note-feedback{font-size:13px;color:#7c6b9e;margin-top:10px;min-height:20px;text-align:center}
.note-feedback.success{color:#6d3bd4}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.history-header .h-title{font-size:17px;font-weight:650;color:#4a2d7a}
.history-header .h-count{font-size:13px;color:#9a84c0}
.btn-clear-history{padding:6px 18px;border-radius:30px;border:1.5px solid #e0d6f2;background:transparent;font-size:13px;color:#7c5c9e;cursor:pointer;transition:all .2s}
.btn-clear-history:hover{background:#fef2f2;border-color:#fca5a5;color:#b91c1c}
.history-list{max-height:350px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#ddd6fe transparent}
.history-list::-webkit-scrollbar{width:5px}
.history-list::-webkit-scrollbar-thumb{background:#ddd6fe;border-radius:20px}
.history-item{padding:14px 0 12px;border-bottom:1px solid #ede9fe}
.history-item:last-child{border-bottom:none}
.history-item .h-meta{display:flex;justify-content:space-between;font-size:13px;color:#8b7aaa;margin-bottom:4px;flex-wrap:wrap;gap:4px}
.history-item .h-meta .h-tag{background:#ede9fe;border-radius:30px;padding:0 12px;font-size:12px;color:#6d3bd4;font-weight:500;height:22px;line-height:22px}
.history-item .h-content{font-size:15px;color:#2d2a3e;word-break:break-word}
.history-empty{text-align:center;color:#b0a0c8;padding:28px 0 12px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(46,31,74,.94);backdrop-filter:blur(10px);color:#f0ebfb;padding:12px 28px;border-radius:40px;font-size:15px;box-shadow:0 8px 32px rgba(0,0,0,.21);opacity:0;transition:all .38s cubic-bezier(.22,1,.36,1);pointer-events:none;z-index:999;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:520px){.container{padding:0 4px}header h1{font-size:28px}.card{padding:20px 16px}.emotion-grid{gap:10px}.emotion-btn{padding:12px 4px 10px}.emotion-btn .emoji-icon{font-size:27px}.mic-btn{width:66px;height:66px;font-size:32px}.info-card .emotion-head .big-emoji{font-size:33px}.info-card .emotion-head .name{font-size:20px}}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">

  <!-- 讯飞配置面板 -->
  <div class="cfg-toggle">
    <button id="cfgToggleBtn" type="button">⚙️ 讯飞配置（ 7f51ad85 / 1b4798e1410e94cbaf310650bd727632 / YTAwZDU1ZDljZWJlMWM5MDFiNDBkNzAw）</button>
  </div>
  <div class="cfg-panel" id="cfgPanel">
    <div class="cfg-row"><label>APPID</label><input id="cfgAppId"  placeholder="如 65432101"  spellcheck="false"/></div>
    <div class="cfg-row" style="margin-top:6px"><label>APIKey</label><input id="cfgApiKey" placeholder="32位字符串" spellcheck="false"/></div>
    <div class="cfg-row" style="margin-top:6px"><label>APISecret</label><input id="cfgApiSecret" placeholder="32位字符串" spellcheck="false"/></div>
    <div style="margin-top:6px"><label><input type="checkbox" id="cfgShow" style="width:auto;margin-right:4px">显示密钥</label></div>
    <div>
      <button class="cfg-save" id="cfgSaveBtn">💾 保存配置</button>
      <span class="cfg-saved" id="cfgSaved"></span>
    </div>
    <p style="margin-top:8px;font-size:11px;color:#9a84c0">配置自动存入本地，刷新不丢。需在 <b>localhost 或 HTTPS</b> 下运行。</p>
  </div>

  <header>
    <h1>✨ 心情能量站</h1>
    <p>倾听内心 · 拥抱成长</p>
  </header>

  <!-- 语音 + 情绪 -->
  <div class="card">
    <div class="mic-section">
      <button id="micBtn" class="mic-btn" draggable="false" aria-label="按住说话">
        <span class="mic-icon">🎤</span>
      </button>
      <div id="micStatus" class="mic-status">按住麦克风说话，松手结束</div>
    </div>
    <div class="emotion-grid" id="emotionGrid">
      <button class="emotion-btn" data-emotion="happy"><span class="emoji-icon">😊</span><span>快乐</span></button>
      <button class="emotion-btn" data-emotion="sad"><span class="emoji-icon">😢</span><span>悲伤</span></button>
      <button class="emotion-btn" data-emotion="angry"><span class="emoji-icon">😠</span><span>愤怒</span></button>
      <button class="emotion-btn" data-emotion="fear"><span class="emoji-icon">😨</span><span>恐惧</span></button>
      <button class="emotion-btn" data-emotion="surprise"><span class="emoji-icon">😲</span><span>惊讶</span></button>
      <button class="emotion-btn" data-emotion="disgust"><span class="emoji-icon">😣</span><span>厌恶</span></button>
    </div>
  </div>

  <!-- 信息卡片 -->
  <div class="card info-card">
    <div class="emotion-head">
      <span class="big-emoji" id="bigEmoji">😊</span>
      <span class="name" id="emotionName">快乐</span>
    </div>
    <div class="section-label">🧠 心理学解释 <span class="tag">AI 解读</span></div>
    <div class="psych-text" id="psychText">快乐是一种积极情绪，源于多巴胺分泌，能增强创造力与社交联结。</div>
    <div class="section-label">🌟 五育小任务 <span class="tag">今日成长</span></div>
    <div class="task-text" id="taskText">德育：分享一件让你开心的小事</div>
    <div class="ai-footer"><span>⚡ 讯飞语音识别</span></div>
  </div>

  <!-- 笔记 -->
  <div class="card note-area">
    <div class="card-title">📝 心情笔记</div>
    <textarea id="noteInput" placeholder="按住 🎤 说话，识别内容会实时显示在这里…"></textarea>
    <div class="note-buttons">
      <button class="btn-save" id="saveNoteBtn">💾 保存</button>
      <button class="btn-read" id="readNoteBtn">🔊 朗读</button>
      <button class="btn-clear" id="clearNoteBtn">🗑️ 清空</button>
    </div>
    <div id="noteFeedback" class="note-feedback"></div>
  </div>

  <!-- 历史 -->
  <div class="card">
    <div class="history-header">
      <span class="h-title">📚 历史记录</span>
      <span class="h-count" id="historyCount">0 条</span>
      <button class="btn-clear-history" id="clearHistoryBtn">清空全部</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">还没有笔记，开始记录吧 ✍️</div>
    </div>
  </div>
</div>

<script>
/* ==========================================================
   0. 讯飞配置面板（配置存 localStorage）
   ========================================================== */
const $cfgToggleBtn = document.getElementById('cfgToggleBtn');
const $cfgPanel     = document.getElementById('cfgPanel');
const $cfgAppId     = document.getElementById('cfgAppId');
const $cfgApiKey    = document.getElementById('cfgApiKey');
const $cfgApiSecret = document.getElementById('cfgApiSecret');
const $cfgShow      = document.getElementById('cfgShow');
const $cfgSaveBtn   = document.getElementById('cfgSaveBtn');
const $cfgSaved     = document.getElementById('cfgSaved');

function loadCfg(){
  try{
    const j=JSON.parse(localStorage.getItem('xf_cfg')||'{}');
    $cfgAppId.value=j.appId||'';$cfgApiKey.value=j.apiKey||'';$cfgApiSecret.value=j.apiSecret||'';
  }catch(e){}
}
function saveCfg(){
  const appId=$cfgAppId.value.trim(), apiKey=$cfgApiKey.value.trim(), apiSecret=$cfgApiSecret.value.trim();
  if(!appId||!apiKey||!apiSecret){$cfgSaved.textContent='❌ 三项都要填';$cfgSaved.style.color='#b91c1c';return;}
  localStorage.setItem('xf_cfg',JSON.stringify({appId,apiKey,apiSecret}));
  $cfgSaved.textContent='✅ 已保存';$cfgSaved.style.color='#059669';
  setTimeout(()=>{$cfgPanel.classList.remove('show')},$cfgSaved.textContent?'600':0);
}
function getCfg(){
  try{const j=JSON.parse(localStorage.getItem('xf_cfg')||'{}');return{j.appId,j.apiKey,j.apiSecret};}catch(e){return{a:'',k:'',s:''}}
}
$cfgToggleBtn.addEventListener('click',()=>{$cfgPanel.classList.toggle('show');if($cfgPanel.classList.contains('show'))loadCfg()});
$cfgSaveBtn.addEventListener('click',saveCfg);
$cfgShow.addEventListener('change',()=>{$cfgApiKey.type=$cfgShow.checked?'text':'password';$cfgApiSecret.type=$cfgShow.checked?'text':'password'});
$cfgApiKey.type='password';$cfgApiSecret.type='password';
loadCfg();

/* ==========================================================
   1. 情绪数据（不变）
   ========================================================== */
const EMOTIONS={
  happy:{emoji:'😊',label:'快乐',psych:'快乐是一种积极情绪，由多巴胺和内啡肽驱动，能提升免疫力、创造力和人际关系质量。经常体验快乐有助于形成心理韧性。',
    tasks:['德育：主动赞美一位同学或家人，分享正能量。','智育：阅读一篇关于积极心理学的短文，记录三个新观点。','体育：跟着音乐跳一支舞，让身体释放快乐因子。','美育：画一幅代表你心中快乐的抽象画，用明亮色彩。','劳育：整理自己的书桌或房间，在整洁中获得成就感。','德育：给陌生人一个微笑或问候，传递善意。','智育：研究"心流"概念，尝试进入一次心流体验。','体育：和朋友一起玩一次追逐游戏或跳绳。','美育：拍一张让你感到幸福的照片，分享给亲友。','劳育：帮家人做一件家务，并记录他们的笑容。','德育：写下三件今天让你感恩的小事。','智育：了解"悲伤的五阶段理论"，思考自己处于哪个阶段。']},
  sad:{emoji:'😢',label:'悲伤',psych:'悲伤是对失去或失望的自然反应，它帮助我们放慢脚步、反思与疗愈。适度表达悲伤能促进情感联结和心理恢复。',
    tasks:['德育：给一位同样难过的朋友写一句安慰的话。','智育：了解"悲伤的五阶段理论"，思考自己处于哪个阶段。','体育：做10分钟温和的瑜伽拉伸，舒缓身心。','美育：听一首忧伤但优美的纯音乐，写下感受。','劳育：整理一件旧物，回忆与之相关的故事，然后释怀。','德育：和信任的人倾诉一次，接受情感支持。','智育：阅读一篇关于"哀伤辅导"的文章，学习如何助人。','体育：去户外散步15分钟，观察自然景色。','美育：写一首短诗表达你此刻的心情。','劳育：种植一株小植物，照料它成长。','德育：给自己写一封鼓励的信，存放起来。','智育：了解"眼泪的化学成分"，知道哭泣也是排毒。']},
  angry:{emoji:'😠',label:'愤怒',psych:'愤怒是边界被侵犯时的警报信号，适度的愤怒可以激发行动力。关键是通过健康方式疏导，避免破坏性爆发。',
    tasks:['德育：练习"非暴力沟通"，用"我感到……因为……"表达不满。','智育：研究"情绪调节策略"，写下三种冷静方法。','体育：进行5分钟高强度运动（如开合跳、拳击动作）释放怒气。','美育：用力撕掉一张废纸，再将碎片拼贴成新的图案。','劳育：打扫一个平时忽略的角落，用劳动转移注意力。','德育：换位思考，写下对方可能的理由。','智育：学习"STOP技术"：停下来、呼吸、观察、继续。','体育：打枕头或沙袋10次，安全发泄。','美育：用红色颜料随意涂鸦，再将其改造成一幅画。','劳育：整理衣柜，把不穿的衣服叠整齐。','德育：主动道歉（即使不完全错），练习宽容。','智育：了解"愤怒冰山"模型，挖掘深层情绪。']},
  fear:{emoji:'😨',label:'恐惧',psych:'恐惧是面对威胁时的本能反应，激活"战或逃"机制。合理评估风险、逐步暴露脱敏可以有效管理恐惧。',

/* --- 构建讯飞鉴权的 wss URL --- */
async function buildXfWsUrl(){
  const {appId:a,apiKey:k,apiSecret:s}=getCfg();
  if(!a||!k||!s) throw new Error('请先点击顶部「⚙️ 讯飞配置」填写并保存三件套');
  const host='iat-api.xfyun.cn';
  const date=new Date().toUTCString(); // RFC1123 GMT
  // 签名串（注意这里的 \n 是真实换行）
  const sigStr=`host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
  const keyBuf=new TextEncoder().encode(s);
  const cryptoKey=await crypto.subtle.importKey('raw',keyBuf,{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sigBuf=await crypto.subtle.sign('HMAC',cryptoKey,new TextEncoder().encode(sigStr));
  const signature=btoa(String.fromCharCode(...new Uint8Array(sigBuf)));
  const authOrigin=`api_key="${k}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
  const authorization=btoa(authOrigin);
  return `wss://${host}/v2/iat?authorization=${encodeURIComponent(authorization)}&date=${encodeURIComponent(date)}&host=${host}`;
}

/* --- Float32 → Int16 PCM，再转 base64 --- */
function float32ToInt16Base64(float32){
  const len=float32.length;
  const buf=new ArrayBuffer(len*2);
  const view=new DataView(buf);
  for(let i=0;i<len;i++){
    let s=Math.max(-1,Math.min(1,float32[i]));
    view.setInt16(i*2,s<0?s*0x8000:s*0x7FFF,true);
  }
  // ArrayBuffer → base64（分段防栈溢出）
  let bin=''; const u8=new Uint8Array(buf); const CH=8192;
  for(let i=0;i<u8.length;i+=CH) bin+=String.fromCharCode.apply(null,u8.subarray(i,i+CH));
  return btoa(bin);
}
