        .info-card .ai-footer span { background: rgba(139, 92, 246, 0.07); padding: 2px 14px; border-radius: 30px; }

        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 6px; }

        .btn-clear-history:hover { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
        .history-list { max-height: 360px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #ddd6fe transparent; }

        .history-empty { text-align: center; color: #b0a0c8; padding: 28px 0 12px; }
        .toast { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(44, 29, 76, 0.94); backdrop-filter: blur(10px); color: #f0ebfb; padding: 12px 34px; border-radius: 40px; font-size: 15px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.21); opacity: 0; transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1); pointer-events: none; z-index: 998; max-width: 90vw; text-align: center; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 540px) { .container { padding: 0 4px; } header h1 { font-size: 28px; } .card { padding: 20px 16px; } .emotion-grid { gap: 10px; } .emotion-btn { padding: 12px 4px 10px; } .emotion-btn .emoji-icon { font-size: 27px; } .mic-btn { width: 64px; height: 64px; font-size: 30px; } .info-card .emotion-head .big-emoji { font-size: 33px; } .info-card .emotion-head .name { font-size: 19px; } }

</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">
    <!-- 安全提醒 -->
    <div class="security-warning">
        ⚠️ <strong>安全提醒</strong>：当前为演示模式，API 密钥直接暴露在前端。<br>生产环境务必通过后端转发请求，以防密钥泄露。
    </div>
    <div class="browser-hint">🎙️ 已接入 <strong>讯飞语音引擎</strong> · 按住说话识别</div>

    <header>
        <h1>✨ 心情能量站</h1>
        <p>倾听内心 · 拥抱成长</p>
    </header>

    <!-- 语音 + 情绪 -->
    <div class="card">
        <div class="mic-section">
            <button id="micBtn" class="mic-btn" draggable="false" aria-label="按住说话">
                <span class="mic-icon">🎤</span>
            </button>
            <div id="micStatus" class="mic-status">按住麦克风说话，松手结束</div>
        </div>
        <div class="emotion-grid" id="emotionGrid">
            <button class="emotion-btn" data-emotion="happy"><span class="emoji-icon">😊</span><span>快乐</span></button>
            <button class="emotion-btn" data-emotion="sad"><span class="emoji-icon">😢</span><span>悲伤</span></button>
            <button class="emotion-btn" data-emotion="angry"><span class="emoji-icon">😠</span><span>愤怒</span></button>
            <button class="emotion-btn" data-emotion="fear"><span class="emoji-icon">😨</span><span>恐惧</span></button>
            <button class="emotion-btn" data-emotion="surprise"><span class="emoji-icon">😲</span><span>惊讶</span></button>
            <button class="emotion-btn" data-emotion="disgust"><span class="emoji-icon">😣</span><span>厌恶</span></button>
        </div>
    </div>

    <!-- 信息卡片 -->
    <div class="card info-card">
        <div class="emotion-head">
            <span class="big-emoji" id="bigEmoji">😊</span>
            <span class="name" id="emotionName">快乐</span>
        </div>
        <div class="section-label">🧠 心理学解释 <span class="tag">AI 解读</span></div>
        <div class="psych-text" id="psychText">快乐是一种积极情绪，源于多巴胺分泌，能增强创造力与社交联结。</div>
        <div class="section-label">🌟 五育小任务 <span class="tag">今日成长</span></div>
        <div class="task-text" id="taskText">德育：分享一件让你开心的小事</div>
        <div class="ai-footer"><span>⚡ AI 实时响应</span></div>
    </div>

    <!-- 笔记 -->
    <div class="card note-area">
        <div class="card-title">📝 心情笔记</div>
        <textarea id="noteInput" placeholder="按住 🎤 说话，识别内容会实时显示在这里…"></textarea>
        <div class="note-buttons">
            <button class="btn-save" id="saveNoteBtn">💾 保存</button>
            <button class="btn-read" id="readNoteBtn">🔊 朗读</button>
            <button class="btn-clear" id="clearNoteBtn">🗑️ 清空</button>
        </div>
        <div id="noteFeedback" class="note-feedback"></div>
    </div>

    <!-- 历史 -->
    <div class="card">
        <div class="history-header">
            <span class="h-title">📚 历史记录</span>
            <span class="h-count" id="historyCount">0 条</span>
            <button class="btn-clear-history" id="clearHistoryBtn">清空全部</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">还没有笔记，开始记录吧 ✍️</div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  1. 情绪数据（与原版完全一致）
    // ============================================================
    const EMOTIONS = {
        happy: {
            emoji: '😊', label: '快乐',
            psych: '快乐是一种积极情绪，由多巴胺和内啡肽驱动，能提升免疫力、创造力和人际关系质量。经常体验快乐有助于形成心理韧性。',
            tasks: ['德育：主动赞美一位同学或家人，分享正能量。','智育：阅读一篇关于积极心理学的短文，记录三个新观点。','体育：跟着音乐跳一支舞，让身体释放快乐因子。','美育：画一幅代表你心中快乐的抽象画，用明亮色彩。','劳育：整理自己的书桌或房间，在整洁中获得成就感。','德育：给陌生人一个微笑或问候，传递善意。','智育：学习一个有趣的笑话并讲给别人听，锻炼幽默感。','体育：和朋友一起玩一次追逐游戏或跳绳。','美育：拍一张让你感到幸福的照片，分享给亲友。','劳育：帮家人做一件家务，并记录他们的笑容。','德育：写下三件今天让你感恩的小事。','智育：研究"心流"概念，尝试进入一次心流体验。']
        },
        sad: {
            emoji: '😢', label: '悲伤',
            psych: '悲伤是对失去或失望的自然反应，它帮助我们放慢脚步、反思与疗愈。适度表达悲伤能促进情感联结和心理恢复。',
            tasks: ['德育：给一位同样难过的朋友写一句安慰的话。','智育：了解"悲伤的五阶段理论"，思考自己处于哪个阶段。','体育：做10分钟温和的瑜伽拉伸，舒缓身心。','美育：听一首忧伤但优美的纯音乐，写下感受。','劳育：整理一件旧物，回忆与之相关的故事，然后释怀。','德育：和信任的人倾诉一次，接受情感支持。','智育：阅读一篇关于"哀伤辅导"的文章，学习如何助人。','体育：去户外散步15分钟，观察自然景色。','美育：写一首短诗表达你此刻的心情。','劳育：种植一株小植物，照料它成长。','德育：给自己写一封鼓励的信，存放起来。','智育：了解"眼泪的化学成分"，知道哭泣也是排毒。']
        },
        angry: {
            emoji: '😠', label: '愤怒',
            psych: '愤怒是边界被侵犯时的警报信号，适度的愤怒可以激发行动力。关键是通过健康方式疏导，避免破坏性爆发。',
            tasks: ['德育：练习"非暴力沟通"，用"我感到……因为……"表达不满。','智育：研究"情绪调节策略"，写下三种冷静方法。','体育：进行5分钟高强度运动（如开合跳、拳击动作）释放怒气。','美育：用力撕掉一张废纸，再将碎片拼贴成新的图案。','劳育：打扫一个平时忽略的角落，用劳动转移注意力。','德育：换位思考，写下对方可能的理由。','智育：学习"STOP技术"：停下来、呼吸、观察、继续。','体育：打枕头或沙袋10次，安全发泄。','美育：用红色颜料随意涂鸦，再将其改造成一幅画。','劳育：整理衣柜，把不穿的衣服叠整齐。','德育：主动道歉（即使不完全错），练习宽容。','智育：了解"愤怒冰山"模型，挖掘深层情绪。']
        },
        fear: {
            emoji: '😨', label: '恐惧',
            psych: '恐惧是面对威胁时的本能反应，激活"战或逃"机制。合理评估风险、逐步暴露脱敏可以有效管理恐惧。',
            tasks: ['德育：向信任的人说出你的恐惧，获得支持。','智育：学习"焦虑盒"技术：把担忧写在纸上，放入盒子。','体育：练习腹式深呼吸（吸气4秒，呼气6秒），重复5次。','美育：画一个"勇气护身符"图案，贴在床头。','劳育：制定一个安全计划（如逃生路线），增强掌控感。','德育：帮助一个比你更害怕的人，获得力量。','智育：了解"恐惧清单"法，逐条评估真实风险。','体育：尝试渐进式肌肉放松训练（从头到脚）。','美育：观看一部励志电影，记录主角如何克服恐惧。','劳育：检查家中安全隐患（如插座、门窗），提高安全感。','德育：写下"如果最坏情况发生，我可以……"，找到应对方案。','智育：学习"暴露疗法"的基本原理，设计一个小挑战。']
        },

            emoji: '😲', label: '惊讶',

    // ============================================================

    // ============================================================
    let currentEmotion = 'happy';
    let isRecording = false;          // 是否正在录音
    let mediaRecorder = null;
    let audioChunks = [];
    let stream = null;
    let ws = null;                   // 讯飞 WebSocket 连接
    let finalResult = '';            // 最终识别结果

    // ============================================================
    //  5. 讯飞 WebSocket 鉴权 & 连接
    // ============================================================
    function buildXfUrl() {
        // 生成 RFC 1123 日期
        const date = new Date().toUTCString();
        // 签名原始字符串
        const signatureOrigin = `host: iat-api.xfyun.cn\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
        // 使用 HMAC-SHA256 加密
        const encoder = new TextEncoder();
        const keyBytes = encoder.encode(XF_API_SECRET);
        const messageBytes = encoder.encode(signatureOrigin);
        return crypto.subtle.importKey(
            'raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' },
            false, ['sign']
        ).then(key => crypto.subtle.sign('HMAC', key, messageBytes))
        .then(sig => {
            const signature = btoa(String.fromCharCode(...new Uint8Array(sig)));
            const authorizationBase = `api_key="${XF_API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
            const authorization = btoa(authorizationBase);
            return `${XF_BASE_URL}?authorization=${authorization}&date=${encodeURIComponent(date)}&host=iat-api.xfyun.cn`;
        });
    }

    // 开始讯飞识别（建立 WebSocket）
    function startXfRecognition() {
        return buildXfUrl().then(url => {
            return new Promise((resolve, reject) => {
                ws = new WebSocket(url);
                ws.onopen = () => {
                    console.log('[讯飞] WebSocket 已打开');
                    // 发送开始参数帧
                    const params = {
                        common: { app_id: XF_APPID },
                        business: {
                            language: 'zh_cn',
                            domain: 'iat',
                            accent: 'mandarin',
                            vad_eos: 3000,
                            dwa: 'wpgs'  // 动态修正
                        },
                        data: {
                            status: 0,   // 第一帧
                            format: 'audio/L16;rate=16000',
                            encoding: 'raw',
                            audio: ''    // 后续发送
                        }
                    };
                    ws.send(JSON.stringify(params));
                    resolve();
                };
                ws.onmessage = (event) => {
                    const resp = JSON.parse(event.data);
                    if (resp.code !== 0) {
                        console.error('[讯飞] 错误:', resp.message);
                        micStatus.textContent = '❌ 讯飞识别出错: ' + resp.message;
                        micStatus.className = 'mic-status error';
                        return;
                    }
                    // 处理识别结果
                    if (resp.data && resp.data.result) {
                        const result = resp.data.result;
                        let text = '';
                        if (result.ws) {
                            for (const wsItem of result.ws) {
                                for (const cw of wsItem.cw) {
                                    text += cw.w;
                                }
                            }
                        }
                        if (text) {
                            finalResult += text;
                            noteInput.value = finalResult;
                            noteInput.scrollTop = noteInput.scrollHeight;
                            micStatus.textContent = `🎤 识别中… ${finalResult.slice(-20)}`;
                            micStatus.className = 'mic-status active';
                        }
                    }
                    // 判断是否结束
                    if (resp.data && resp.data.status === 2) {
                        // 最后一帧
                        console.log('[讯飞] 识别结束');
                    }
                };
                ws.onerror = (err) => {
                    console.error('[讯飞] WebSocket 错误:', err);
                    reject(err);
                };
                ws.onclose = (e) => {
                    console.log('[讯飞] 连接关闭, code:', e.code);
                    ws = null;
                };
            });
        }).catch(err => {
            console.error('[讯飞] 启动失败:', err);
            throw err;
        });
    }

    // 发送音频数据到讯飞
    function sendAudioToXf(audioBase64, isLast) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.warn('[讯飞] WebSocket 未连接');
            return;
        }
        const frame = {
            data: {
                status: isLast ? 2 : 1,
                format: 'audio/L16;rate=16000',
                encoding: 'raw',
                audio: audioBase64
            }
        };
        ws.send(JSON.stringify(frame));
    }

    // 关闭讯飞连接
    function closeXfConnection() {
        if (ws) {
            try { ws.close(); } catch(e) {}
            ws = null;
        }
    }

    // ============================================================
    //  6. 录音控制（使用 MediaRecorder → PCM 16000Hz 单声道）
    // ============================================================
    async function startRecording() {
        if (isRecording) return;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: {
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: true,
                noiseSuppression: true
            }});
            // 使用 AudioContext 重采样到 16000 Hz 并转为 PCM raw
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const source = audioCtx.createMediaStreamSource(stream);
            const recorder = new MediaRecorder(stream, {
                mimeType: 'audio/webm;codecs=opus' // 浏览器兼容格式，后面转码
            });
            mediaRecorder = recorder;
            audioChunks = [];

            // 由于浏览器不支持直接输出 PCM raw，我们使用 ScriptProcessorNode 采集 PCM 数据
            // 但 MediaRecorder 更方便，但输出是 opus 压缩格式，无法直接发送给讯飞（需要 raw）
            // 因此我们改用 AudioWorklet 或 ScriptProcessorNode 直接获取 PCM 数据
            // 为了简化，我们使用 Recorder.js 思路：创建 ScriptProcessorNode
            // 但为了减少依赖，我们使用另一种方法：通过 MediaRecorder 录制 webm，然后在停止后用 ffmpeg.js 转换？
            // 太复杂。我们改为使用 AudioContext 的 createScriptProcessor 直接获取 PCM 数据
            // 放弃 MediaRecorder，改用 ScriptProcessorNode 实时采集

            // 重新实现：不使用 MediaRecorder，而是直接用 ScriptProcessorNode
            // 先停止之前的 stream
            stream.getTracks().forEach(track => track.stop());

            // 重新获取流
            stream = await navigator.mediaDevices.getUserMedia({ audio: {
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: true,
                noiseSuppression: true
            }});
            const newAudioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const newSource = newAudioCtx.createMediaStreamSource(stream);
            const scriptNode = newAudioCtx.createScriptProcessor(4096, 1, 1);
            let pcmBuffer = [];

            scriptNode.onaudioprocess = (event) => {
                if (!isRecording) return;
                const inputData = event.inputBuffer.getChannelData(0); // Float32
                // 转换为 16-bit PCM
                const pcm16 = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    const s = Math.max(-1, Math.min(1, inputData[i]));
                    pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                pcmBuffer.push(pcm16);
                // 每积累约 200ms 的数据就发送一次
                const totalSamples = pcmBuffer.reduce((acc, arr) => acc + arr.length, 0);
                if (totalSamples >= 3200) { // 200ms @ 16kHz = 3200 samples
                    // 合并并发送
                    let mergedLength = pcmBuffer.reduce((acc, arr) => acc + arr.length, 0);
                    const merged = new Int16Array(mergedLength);
                    let offset = 0;
                    for (const buf of pcmBuffer) {
                        merged.set(buf, offset);
                        offset += buf.length;
                    }
                    pcmBuffer = [];
                    // base64 编码
                    const bytes = new Uint8Array(merged.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.byteLength; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    const base64 = btoa(binary);
                    sendAudioToXf(base64, false);
                }
            };

            // 连接节点
            newSource.connect(scriptNode);
            scriptNode.connect(newAudioCtx.destination);

            // 保存引用以便停止
            window._xfAudioCtx = newAudioCtx;
            window._xfScriptNode = scriptNode;
            window._xfSource = newSource;
            window._xfPcmBuffer = pcmBuffer;

            // 启动讯飞 WebSocket
            await startXfRecognition();
            isRecording = true;
            micBtn.classList.add('listening');
            noteInput.classList.add('recording-highlight');
            micStatus.textContent = '🎙️ 正在聆听…松手结束';
            micStatus.className = 'mic-status active';
            noteInput.value = '';
            finalResult = '';
            noteFeedback.textContent = '';
        } catch (err) {
            console.error('录音启动失败:', err);
            micStatus.textContent = '❌ 麦克风访问被拒绝或出错';
            micStatus.className = 'mic-status error';
            if (stream) stream.getTracks().forEach(t => t.stop());
            isRecording = false;
        }
    }

    function stopRecordingAndRecognize() {
        if (!isRecording) return;
        isRecording = false;
        micBtn.classList.remove('listening');
        noteInput.classList.remove('recording-highlight');

        // 发送最后一个音频块（如果有剩余数据）
        if (window._xfPcmBuffer && window._xfPcmBuffer.length > 0) {
            let mergedLength = window._xfPcmBuffer.reduce((acc, arr) => acc + arr.length, 0);
            if (mergedLength > 0) {
                const merged = new Int16Array(mergedLength);
                let offset = 0;
                for (const buf of window._xfPcmBuffer) {
                    merged.set(buf, offset);
                    offset += buf.length;
                }
                window._xfPcmBuffer = [];
                const bytes = new Uint8Array(merged.buffer);
                let binary = '';
                for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                const base64 = btoa(binary);
                sendAudioToXf(base64, true);
            }
        } else {
            // 直接发送结束帧
            sendAudioToXf('', true);
        }

        // 关闭音频上下文
        if (window._xfScriptNode) {
            window._xfScriptNode.disconnect();
            window._xfScriptNode = null;
        }
        if (window._xfSource) {
            window._xfSource.disconnect();
            window._xfSource = null;
        }
        if (window._xfAudioCtx) {
            window._xfAudioCtx.close();
            window._xfAudioCtx = null;
        }
