<script>
    // ========================================================================
    //  0. 🔐 加密解密模块
    // ========================================================================
    const ENC_APPID     = 'N2Y1MWFkODU=';
    const ENC_API_SECRET = 'WVRBd1pEVTFaRGxqWldKbE1XTTVNREZpTkRCa056QXc=';
    const ENC_API_KEY   = 'MWI0Nzk4ZTE0MTBlOTRjYmFmMzEwNjUwYmQ3Mjc2MzI=';

    function decodeCredential(encoded) {
        try { return atob(encoded); } catch (e) { console.error('凭据解密失败', e); return ''; }
    }

    const XF_APPID       = decodeCredential(ENC_APPID);
    const XF_API_SECRET  = decodeCredential(ENC_API_SECRET);
    const XF_API_KEY     = decodeCredential(ENC_API_KEY);
    const XF_BASE_URL    = 'wss://iat-api.xfyun.cn/v2/iat';

    // ========================================================================
    //  1. 情绪数据
    // ========================================================================
    const EMOTIONS = {
        happy: { emoji:'😊', label:'快乐', psych:'快乐是一种积极情绪，由多巴胺和内啡肽驱动，能提升免疫力、创造力和人际关系质量。', tasks:['德育：主动赞美一位同学或家人。','智育：阅读一篇积极心理学短文。','体育：跟着音乐跳舞。','美育：画一幅快乐抽象画。','劳育：整理书桌。'] },
        sad: { emoji:'😢', label:'悲伤', psych:'悲伤是对失去或失望的自然反应，适度表达能促进情感联结。', tasks:['德育：安慰一位朋友。','智育：了解悲伤五阶段。','体育：做瑜伽拉伸。','美育：听忧伤纯音乐。','劳育：整理旧物释怀。'] },
        angry: { emoji:'😠', label:'愤怒', psych:'愤怒是边界被侵犯的信号，关键是用健康方式疏导。', tasks:['德育：用非暴力沟通表达。','智育：学习STOP技术。','体育：开合跳5分钟。','美育：撕纸拼贴。','劳育：打扫角落。'] },
        fear: { emoji:'😨', label:'恐惧', psych:'恐惧是本能反应，合理评估风险可以有效管理。', tasks:['德育：向信任的人倾诉。','智育：制作焦虑盒。','体育：腹式深呼吸。','美育：画勇气护身符。','劳育：检查安全隐患。'] },
        surprise: { emoji:'😲', label:'惊讶', psych:'惊讶打破预期，促使我们重新评估环境。', tasks:['德育：给身边人制造惊喜。','智育：学一个冷知识。','体育：尝试新运动姿势。','美育：欣赏超现实主义画作。','劳育：改变房间布局。'] },
        disgust: { emoji:'😣', label:'厌恶', psych:'厌恶具有保护作用，学会区分合理厌恶与偏见。', tasks:['德育：反思偏见经历。','智育：了解道德厌恶。','体育：洗手30秒。','美育：清理手机相册。','劳育：清洗水杯。'] }
    };
    for (let k in EMOTIONS) {
        while(EMOTIONS[k].tasks.length < 6) EMOTIONS[k].tasks.push('德育：记录今天的情绪变化。');
    }

    // ========================================================================
    //  2. 状态 & DOM
    // ========================================================================
    let currentEmotion = 'happy';
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let stream = null;
    let ws = null;
    let finalTranscript = '';
    let isProcessing = false; // 防止重复处理

    const micBtn = document.getElementById('micBtn');
    const micStatus = document.getElementById('micStatus');
    const emotionBtns = document.querySelectorAll('.emotion-btn');
    const bigEmoji = document.getElementById('bigEmoji');
    const emotionName = document.getElementById('emotionName');
    const psychText = document.getElementById('psychText');
    const taskText = document.getElementById('taskText');
    const noteInput = document.getElementById('noteInput');
    const saveNoteBtn = document.getElementById('saveNoteBtn');
    const readNoteBtn = document.getElementById('readNoteBtn');
    const clearNoteBtn = document.getElementById('clearNoteBtn');
    const noteFeedback = document.getElementById('noteFeedback');
    const historyList = document.getElementById('historyList');
    const historyCount = document.getElementById('historyCount');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const toastEl = document.getElementById('toast');
    const synth = window.speechSynthesis;
    let zhVoice = null;
    if (synth) {
        synth.onvoiceschanged = () => { zhVoice = synth.getVoices().find(v => v.lang.startsWith('zh')); };
        zhVoice = synth.getVoices().find(v => v.lang.startsWith('zh'));
    }

    // ========================================================================
    //  3. 工具函数
    // ========================================================================
    function getRandomTask(key) {
        const tasks = EMOTIONS[key].tasks;
        return tasks[Math.floor(Math.random() * tasks.length)];
    }
    function showToast(msg, duration = 2400) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastEl._timer);
        toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }
    function updateInfo(emotionKey) {
        const data = EMOTIONS[emotionKey];
        if (!data) return;
        bigEmoji.textContent = data.emoji;
        emotionName.textContent = data.label;
        psychText.textContent = data.psych;
        taskText.textContent = getRandomTask(emotionKey);
        currentEmotion = emotionKey;
        emotionBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.emotion === emotionKey));
    }
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    // ========================================================================
    //  4. 情绪按钮
    // ========================================================================
    emotionBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            updateInfo(this.dataset.emotion);
            if (isRecording) stopRecordingAndSend();
        });
    });

    // ========================================================================
    //  5. 讯飞 WebSocket 鉴权
    // ========================================================================
    async function buildXfUrl() {
        const date = new Date().toUTCString();
        const signatureOrigin = `host: iat-api.xfyun.cn\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
        const encoder = new TextEncoder();
        const keyBytes = encoder.encode(XF_API_SECRET);
        const msgBytes = encoder.encode(signatureOrigin);
        const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const sig = await crypto.subtle.sign('HMAC', key, msgBytes);
        const signature = btoa(String.fromCharCode(...new Uint8Array(sig)));
        const authBase = `api_key="${XF_API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
        const authorization = btoa(authBase);
        return `${XF_BASE_URL}?authorization=${authorization}&date=${encodeURIComponent(date)}&host=iat-api.xfyun.cn`;
    }

    // ========================================================================
    //  6. 核心修复：录音 → 转 PCM → 发送讯飞 → 获取结果
    // ========================================================================
    function startRecording() {
        if (isRecording || isProcessing) return;
        audioChunks = [];
        finalTranscript = '';

        navigator.mediaDevices.getUserMedia({
            audio: {
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: true,
                noiseSuppression: true
            }
        })
        .then(s => {
            stream = s;
            const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                ? 'audio/webm;codecs=opus'
                : 'audio/webm';
            mediaRecorder = new MediaRecorder(s, { mimeType: mimeType });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                if (audioChunks.length > 0) {
                    convertWebmToPcmAndSend();
                } else {
                    micStatus.textContent = '⏹️ 未检测到语音';
                    micStatus.className = 'mic-status';
                    showToast('未录制到音频', 1800);
                }
            };
            mediaRecorder.start(250);
            isRecording = true;
            micBtn.classList.add('listening');
            noteInput.classList.add('recording-highlight');
            micStatus.textContent = '🎙️ 正在聆听…松手结束';
            micStatus.className = 'mic-status active';
            noteInput.value = '';
            noteFeedback.textContent = '';
            showToast('🎤 录音开始', 1100);
        })
        .catch(err => {
            console.error('麦克风错误:', err);
            micStatus.textContent = '❌ 麦克风访问被拒绝';
            micStatus.className = 'mic-status error';
            showToast('❌ 请允许麦克风权限', 2600);
        });
    }

    function stopRecordingAndSend() {
        if (!isRecording || !mediaRecorder || mediaRecorder.state === 'inactive') return;
        isRecording = false;
        micBtn.classList.remove('listening');
        noteInput.classList.remove('recording-highlight');
        micStatus.textContent = '⏳ 处理音频中…';
        micStatus.className = 'mic-status active';
        mediaRecorder.stop();
    }

    async function convertWebmToPcmAndSend() {
        if (audioChunks.length === 0 || isProcessing) return;
        isProcessing = true;

        const blob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
        const arrayBuffer = await blob.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        try {
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const channelData = audioBuffer.getChannelData(0);
            const originalSampleRate = audioBuffer.sampleRate;

            // 重采样到16kHz
            let pcmData;
            if (originalSampleRate === 16000) {
                pcmData = float32ToInt16(channelData);
            } else {
                const ratio = 16000 / originalSampleRate;
                const newLength = Math.round(channelData.length * ratio);
                const resampled = new Float32Array(newLength);
                for (let i = 0; i < newLength; i++) {
                    const origIndex = i / ratio;
                    const indexFloor = Math.floor(origIndex);
                    const frac = origIndex - indexFloor;
                    if (indexFloor + 1 < channelData.length) {
                        resampled[i] = channelData[indexFloor] * (1 - frac) + channelData[indexFloor + 1] * frac;
                    } else {
                        resampled[i] = channelData[channelData.length - 1];
                    }
                }
                pcmData = float32ToInt16(resampled);
            }

            // 转为Base64
            const bytes = new Uint8Array(pcmData.buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            const audioBase64 = btoa(binary);

            // 建立WebSocket连接
            const url = await buildXfUrl();
            ws = new WebSocket(url);

            ws.onopen = () => {
                // 发送开始帧
                const startFrame = {
                    common: { app_id: XF_APPID },
                    business: {
                        language: 'zh_cn',
                        domain: 'iat',
                        accent: 'mandarin',
                        vad_eos: 4000,  // 增大静音检测时间
                        dwa: 'wpgs'
                    },
                    data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                };
                ws.send(JSON.stringify(startFrame));

                // 分片发送（每片约1秒音频）
                const CHUNK_SIZE = 12800; // 约1秒的16kHz 16bit PCM数据
                let offset = 0;
                const totalLen = audioBase64.length;

                if (totalLen <= CHUNK_SIZE) {
                    // 音频很短，一次性发送
                    ws.send(JSON.stringify({
                        data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: audioBase64 }
                    }));
                } else {
                    while (offset < totalLen) {
                        const end = Math.min(offset + CHUNK_SIZE, totalLen);
                        const chunk = audioBase64.slice(offset, end);
                        const isLast = (end >= totalLen);
                        ws.send(JSON.stringify({
                            data: {
                                status: isLast ? 2 : 1,
                                format: 'audio/L16;rate=16000',
                                encoding: 'raw',
                                audio: chunk
                            }
                        }));
                        offset = end;
                    }
                }
            };

            let accumulatedText = '';

            ws.onmessage = (event) => {
                try {
                    const resp = JSON.parse(event.data);
                    if (resp.code !== 0) {
                        console.error('讯飞错误:', resp.message);
                        micStatus.textContent = '❌ 识别失败: ' + resp.message;
                        micStatus.className = 'mic-status error';
                        showToast('❌ 讯飞识别出错', 3600);
                        ws.close();
                        return;
                    }

                    if (resp.data && resp.data.result) {
                        const r = resp.data.result;
                        let seg = '';
                        if (r.ws) {
                            for (const w of r.ws) {
                                for (const c of w.cw) seg += c.w;
                            }
                        }

                        // 核心修复：简化处理逻辑
                        if (seg) {
                            if (r.pgs === 'rpl') {
                                // 替换模式：直接用seg作为新结果
                                accumulatedText = seg;
                            } else {
                                // 追加模式：累积
                                accumulatedText += seg;
                            }
                            // 更新显示
                            noteInput.value = accumulatedText;
                            noteInput.scrollTop = noteInput.scrollHeight;
                            micStatus.textContent = `🎤 识别中… ${accumulatedText.slice(-30)}`;
                            micStatus.className = 'mic-status active';
                        }
                    }

                    // 识别完成
                    if (resp.data && resp.data.status === 2) {
                        finalTranscript = accumulatedText;
                        micStatus.textContent = `✅ 识别完成：${accumulatedText.length} 字`;
                        micStatus.className = 'mic-status success';
                        if (accumulatedText.trim()) {
                            autoMatchEmotion(accumulatedText);
                            speakContent(accumulatedText);
                        }
                        ws.close();
                        ws = null;
                        isProcessing = false;
                    }
                } catch (parseError) {
                    console.error('解析响应失败:', parseError);
                }
            };

            ws.onerror = (err) => {
                console.error('WebSocket 错误:', err);
                micStatus.textContent = '❌ 网络连接失败';
                micStatus.className = 'mic-status error';
                showToast('❌ 请检查网络', 3300);
                isProcessing = false;
            };

            ws.onclose = () => {
                ws = null;
                audioCtx.close();
                if (isProcessing) isProcessing = false;
            };

        } catch (err) {
            console.error('音频处理失败:', err);
            micStatus.textContent = '❌ 音频解码失败';
            micStatus.className = 'mic-status error';
            showToast('❌ 音频格式错误', 2900);
            audioCtx.close();
            isProcessing = false;
        }
    }

    function float32ToInt16(float32Array) {
        const len = float32Array.length;
        const int16 = new Int16Array(len);
        for (let i = 0; i < len; i++) {
            const s = Math.max(-1, Math.min(1, float32Array[i]));
            int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        return int16;
    }

    // ========================================================================
    //  7. 情绪自动匹配 & 语音朗读
    // ========================================================================
    function autoMatchEmotion(text) {
        const lower = text.toLowerCase();
        const rules = [
            { words: ['快乐','开心','高兴','愉快','爽','哈哈','耶','幸福','喜悦'], key:'happy' },
            { words: ['悲伤','难过','伤心','哭','沮丧','忧郁','哀伤','心碎','失落'], key:'sad' },
            { words: ['愤怒','生气','恼火','怒','烦躁','不爽','气死','恨','暴躁'], key:'angry' },
            { words: ['恐惧','害怕','紧张','不安','恐慌','焦虑','担心','畏惧','吓'], key:'fear' },
            { words: ['惊讶','吃惊','意外','震惊','没想到','居然','竟然','哇','天哪'], key:'surprise' },
            { words: ['厌恶','讨厌','恶心','反感','嫌弃','烦','受不了','憎恶'], key:'disgust' }
        ];
        for (const r of rules) {
            if (r.words.some(w => lower.includes(w))) {
                updateInfo(r.key);
                showToast(`🧠 识别到「${EMOTIONS[r.key].label}」情绪`, 1900);
                return;
            }
        }
        showToast('💬 未识别到特定情绪', 1500);
    }

    function speakContent(text) {
        if (!synth) return;
        if (synth.speaking) synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-CN';
        if (zhVoice) utter.voice = zhVoice;
        synth.speak(utter);
    }

    // ========================================================================
    //  8. 麦克风按钮事件
    // ========================================================================
    micBtn.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        if (!isRecording && !isProcessing) startRecording();
    });
    micBtn.addEventListener('pointerup', function(e) {
        e.preventDefault();
        if (isRecording) stopRecordingAndSend();
    });
    micBtn.addEventListener('pointerleave', function(e) {
        if (isRecording) stopRecordingAndSend();
    });

    // ========================================================================
    //  9. 笔记存储 & 历史渲染
    // ========================================================================
    function getNotes() { try { return JSON.parse(localStorage.getItem('mood_notes') || '[]'); } catch { return []; } }
    function setNotes(arr) { localStorage.setItem('mood_notes', JSON.stringify(arr)); }
    function renderHistory() {
        const notes = getNotes();
        historyCount.textContent = `${notes.length} 条`;
        if (notes.length === 0) {
            historyList.innerHTML = '<div class="history-empty">还没有笔记，开始记录吧 ✍️</div>';
            return;
        }
        notes.sort((a,b) => new Date(b.time) - new Date(a.time));
        let html = '';
        notes.forEach(n => {
            const d = new Date(n.time);
            const ts = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            const emo = EMOTIONS[n.emotion] || { emoji:'💬', label:n.emotion };
            html += `<div class="history-item"><div class="h-meta"><span>${ts}</span><span class="h-tag">${emo.emoji} ${emo.label}</span></div><div class="h-content">${escapeHtml(n.content)}</div></div>`;
        });
        historyList.innerHTML = html;
    }

    saveNoteBtn.addEventListener('click', function() {
        const content = noteInput.value.trim();
        if (!content) { noteFeedback.textContent = '✏️ 请先输入内容'; noteFeedback.className = 'note-feedback'; return; }
        const notes = getNotes();
        notes.push({ time: new Date().toISOString(), emotion: currentEmotion, content });
        setNotes(notes);
        renderHistory();
        noteInput.value = '';
        noteFeedback.textContent = '✅ 笔记已保存！';
        noteFeedback.className = 'note-feedback success';
        showToast('💾 笔记已保存', 1800);
    });

    clearNoteBtn.addEventListener('click', function() {
        noteInput.value = '';
        noteFeedback.textContent = '🗑️ 笔记已清空';
        noteFeedback.className = 'note-feedback';
    });

    readNoteBtn.addEventListener('click', function() {
        const text = noteInput.value.trim();
        if (text) speakContent(text);
        else {
            const psych = psychText.textContent;
            const task = taskText.textContent;
            speakContent(`心理学解释：${psych}。五育小任务：${task}`);
        }
    });

    clearHistoryBtn.addEventListener('click', function() {
        if (getNotes().length === 0) { showToast('📭 暂无笔记', 1650); return; }
        if (confirm('确定清空所有笔记？')) {
            setNotes([]);
            renderHistory();
            noteFeedback.textContent = '🗑️ 历史已清空';
            showToast('已清空所有笔记', 1800);
        }
    });

    // ========================================================================
    //  10. 初始化
    // ========================================================================
    updateInfo('happy');
    renderHistory();
    if (synth) synth.getVoices();

    window.addEventListener('beforeunload', function() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (ws) ws.close();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    });
</script>
